name: Publish static site

on:
    push:
        branches:
            - build
        paths:
            - "build/**"
            - ".github/workflows/publish-static-site.yml"
            - "README.md"
    workflow_dispatch:

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout build branch
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Validate production-ready static output
              run: |
                chmod +x .github/scripts/validate-static-site.sh
                .github/scripts/validate-static-site.sh build

            - name: Publish build directory to main
              uses: peaceiris/actions-gh-pages@v4
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_branch: main
                  publish_dir: ./build
                  force_orphan: true
                  enable_jekyll: false
